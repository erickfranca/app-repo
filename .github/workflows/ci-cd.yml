name: CI/CD app-repo

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout app-repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build com Maven
        run: mvn package -DskipTests -B

      - name: Definir tag da imagem
        id: vars
        run: echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build e push da imagem
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/lab-springboot-app:${{ steps.vars.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/lab-springboot-app:latest

      - name: Checkout manifests-repo
        uses: actions/checkout@v4
        with:
          repository: erickfranca/manifests-repo
          token: ${{ secrets.MANIFESTS_REPO_PAT }}
          path: manifests-repo

      - name: Atualizar tag da imagem no values.yaml
        run: |
          cd manifests-repo
          sed -i "s/tag: .*/tag: \"${{ steps.vars.outputs.tag }}\"/" charts/lab-app/values.yaml
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add charts/lab-app/values.yaml
          git commit -m "deploy: atualiza imagem para ${{ steps.vars.outputs.tag }}"
          git push